name: Build modpacks

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.profile }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [client-minimal, client-full, server]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Build mrpack
        run: |
          version="$(python -c 'import json; print(json.load(open("pack/pack.json"))["version"])')"
          ./scripts/build-mrpack \
            --profile "pack/profiles/${{ matrix.profile }}.json" \
            --output "dist/smp-$version-${{ matrix.profile }}.mrpack"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.profile }}
          path: dist/*.mrpack
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.mrpack --generate-notes --verify-tag
